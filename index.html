<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copilot Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── 顶栏 ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: #181825;
      border-bottom: 1px solid #313244;
    }
    header h1 { font-size: 1rem; font-weight: 600; flex: 1; }
    #status-badge {
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 999px;
      background: #45475a;
      color: #a6adc8;
    }
    #status-badge.online { background: #a6e3a1; color: #1e1e2e; }
    #btn-login {
      font-size: 0.8rem;
      padding: 5px 14px;
      border: none;
      border-radius: 6px;
      background: #89b4fa;
      color: #1e1e2e;
      cursor: pointer;
      font-weight: 600;
    }
    #btn-login:hover { background: #74c7ec; }

    /* ── 消息区 ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.9rem;
    }
    .msg.user   { align-self: flex-end; background: #89b4fa; color: #1e1e2e; border-bottom-right-radius: 3px; }
    .msg.assistant { align-self: flex-start; background: #313244; color: #cdd6f4; border-bottom-left-radius: 3px; }
    .msg.system { align-self: center; background: transparent; color: #6c7086; font-size: 0.78rem; }

    /* ── 输入区 ── */
    #input-area {
      padding: 14px 20px;
      background: #181825;
      border-top: 1px solid #313244;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #attachments {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .attach-btn {
      font-size: 0.78rem;
      padding: 4px 10px;
      border: 1px solid #45475a;
      border-radius: 6px;
      background: transparent;
      color: #a6adc8;
      cursor: pointer;
    }
    .attach-btn:hover { border-color: #89b4fa; color: #89b4fa; }
    #file-name, #url-display {
      font-size: 0.75rem;
      color: #a6e3a1;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #url-input-row {
      display: none;
      gap: 6px;
    }
    #url-input-row.visible { display: flex; }
    #url-text {
      flex: 1;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid #45475a;
      background: #1e1e2e;
      color: #cdd6f4;
      font-size: 0.82rem;
    }
    #url-text:focus { outline: none; border-color: #89b4fa; }
    #btn-url-confirm {
      padding: 5px 12px;
      border: none;
      border-radius: 6px;
      background: #89b4fa;
      color: #1e1e2e;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
    }

    #chat-row {
      display: flex;
      gap: 8px;
    }
    #user-input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #45475a;
      background: #1e1e2e;
      color: #cdd6f4;
      font-size: 0.9rem;
      resize: none;
      height: 44px;
      max-height: 160px;
      overflow-y: auto;
      line-height: 1.5;
    }
    #user-input:focus { outline: none; border-color: #89b4fa; }
    #btn-send {
      padding: 0 18px;
      border: none;
      border-radius: 10px;
      background: #89b4fa;
      color: #1e1e2e;
      font-size: 1.1rem;
      cursor: pointer;
      font-weight: 700;
    }
    #btn-send:disabled { background: #45475a; color: #6c7086; cursor: not-allowed; }
    #btn-send:hover:not(:disabled) { background: #74c7ec; }

    /* ── 导出按钮 ── */
    #export-area {
      display: none;
      padding: 6px 20px 10px;
      background: #181825;
      gap: 8px;
    }
    #export-area.visible { display: flex; }
    .export-btn {
      font-size: 0.78rem;
      padding: 4px 12px;
      border: 1px solid #45475a;
      border-radius: 6px;
      background: transparent;
      color: #a6adc8;
      cursor: pointer;
    }
    .export-btn:hover { border-color: #a6e3a1; color: #a6e3a1; }

    /* ── 登录提示弹窗 ── */
    #login-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #login-modal.visible { display: flex; }
    #login-box {
      background: #313244;
      border-radius: 14px;
      padding: 28px 32px;
      text-align: center;
      max-width: 360px;
      width: 90%;
    }
    #login-box h2 { margin-bottom: 10px; font-size: 1rem; }
    #login-box p  { font-size: 0.85rem; color: #a6adc8; margin-bottom: 16px; line-height: 1.6; }
    #user-code {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: #89b4fa;
      margin-bottom: 16px;
    }
    #btn-close-modal {
      padding: 7px 20px;
      border: none;
      border-radius: 8px;
      background: #45475a;
      color: #cdd6f4;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- 顶栏 -->
<header>
  <h1>🤖 Copilot Chat</h1>
  <span id="status-badge">未登录</span>
  <button id="btn-login">登录 Copilot</button>
</header>

<!-- 消息列表 -->
<div id="messages">
  <div class="msg system">欢迎使用 Copilot Chat。请先登录，然后开始对话。</div>
</div>

<!-- 导出区 -->
<div id="export-area">
  <button class="export-btn" id="btn-export-txt">导出 .txt</button>
  <button class="export-btn" id="btn-export-csv">导出 .csv</button>
  <button class="export-btn" id="btn-export-md">导出 .md</button>
</div>

<!-- 输入区 -->
<div id="input-area">
  <div id="attachments">
    <button class="attach-btn" id="btn-attach-file">📎 附加文件</button>
    <span id="file-name"></span>
    <button class="attach-btn" id="btn-attach-url">🔗 输入网址</button>
    <span id="url-display"></span>
    <button class="attach-btn" id="btn-clear-attach" style="display:none">✕ 清除附件</button>
  </div>
  <div id="url-input-row">
    <input id="url-text" type="url" placeholder="https://example.com" />
    <button id="btn-url-confirm">确认</button>
  </div>
  <div id="chat-row">
    <textarea id="user-input" placeholder="输入消息，Shift+Enter 换行，Enter 发送…" rows="1"></textarea>
    <button id="btn-send">➤</button>
  </div>
</div>

<!-- 隐藏文件选择器 -->
<input type="file" id="file-input" style="display:none" accept=".txt,.md,.csv,.json,.js,.ts,.py,.java,.html,.css,.xml,.yaml,.yml" />

<!-- 登录弹窗 -->
<div id="login-modal">
  <div id="login-box">
    <h2>GitHub 设备授权</h2>
    <p>浏览器已自动打开验证页面，请在页面中输入以下代码：</p>
    <div id="user-code">------</div>
    <p id="verify-url" style="font-size:0.75rem;word-break:break-all;"></p>
    <button id="btn-close-modal">我已完成授权</button>
  </div>
</div>

<script src="index.js"></script>
</body>
</html>
